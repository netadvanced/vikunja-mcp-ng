# ---------------------------------------------------------------------------
# Tag-triggered release workflow — the ONLY active workflow in this repository.
#
# Trigger: pushing a `vX.Y.Z` tag (which only happens via scripts/release-tag.sh,
# see docs/RELEASING.md). PRs and branch pushes never run Actions here — that is
# a deliberate owner decision ("only releases run CI"); the inherited ci.yml and
# security.yml were removed when this was installed (2026-07-20).
#
# npm auth: OIDC Trusted Publishing — NO tokens, NO repository secrets. npmjs.com
# is configured (package settings → Trusted Publisher) to trust this exact repo +
# workflow filename; npm ≥ 11.5.1 exchanges the Actions OIDC token automatically
# at publish time, and provenance attestation is generated by default.
# GHCR push and the GitHub release use the built-in GITHUB_TOKEN.
#
# Local fallback: scripts/release-publish.sh remains fully equivalent (minus
# provenance) if Actions is ever unavailable.
# ---------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # gh release create
  packages: write # ghcr.io push
  id-token: write # npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — needed to read the CHANGELOG.md section for this tag

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports OIDC trusted publishing (>= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npx jest --silent

      - name: Test coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -pe "require('./package.json').version")"
          if [[ "$TAG_NAME" != "$PKG_VERSION" ]]; then
            echo "::error::Tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm (OIDC trusted publishing, provenance automatic)
        run: npm publish --access public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Determine Vikunja compatibility version
        id: vikunja-compat
        # Single source of truth: scripts/lib/vikunja-compat-version.sh derives this from the
        # vendored OpenAPI spec (docs/vikunja-openapi.json) and warns loudly on stderr if it
        # disagrees with the e2e docker-compose pin. Never hand-type this version — see
        # docs/RELEASING.md "Vikunja compatibility".
        run: echo "value=$(scripts/lib/vikunja-compat-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/netadvanced/vikunja-mcp-ng:${{ steps.version.outputs.value }}
            ghcr.io/netadvanced/vikunja-mcp-ng:latest
            ghcr.io/netadvanced/vikunja-mcp-ng:${{ steps.version.outputs.value }}-vikunja${{ steps.vikunja-compat.outputs.value }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            io.vikunja.compat=${{ steps.vikunja-compat.outputs.value }}

      - name: Extract changelog section for this version
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          START_LINE="$(grep -n -E "^## \[${VERSION}\]" CHANGELOG.md | head -1 | cut -d: -f1)"
          if [[ -z "$START_LINE" ]]; then
            echo "::error::No '## [$VERSION]' section found in CHANGELOG.md"
            exit 1
          fi
          END_LINE="$(tail -n "+$((START_LINE + 1))" CHANGELOG.md | grep -n -E '^## \[' | head -1 | cut -d: -f1 || true)"
          if [[ -n "$END_LINE" ]]; then
            END_LINE=$((START_LINE + END_LINE - 1))
          else
            END_LINE="$(wc -l < CHANGELOG.md | tr -d ' ')"
          fi
          sed -n "${START_LINE},${END_LINE}p" CHANGELOG.md > release-notes.md
          cat release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping (idempotent)."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
