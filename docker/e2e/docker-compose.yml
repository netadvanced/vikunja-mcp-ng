# Disposable local Vikunja + Postgres stack for running scripts/test-mcp.ts
# (npm run test:mcp) against a real Vikunja server instead of a mocked one.
#
# See docs/LOCAL-TESTING.md for the full workflow (bring up, bootstrap,
# point test:mcp at it, tear down).
#
# Everything in this file is namespaced under the "vikunja-mcp-e2e" compose
# project (see the top-level `name:` below) and uses non-default host ports,
# so it cannot collide with anything else the machine happens to be running
# — including another Vikunja instance, or a *production* Vikunja.
#
# Version pin: vikunja/vikunja:2.4.0 (the go-vikunja/vikunja v2.4.0 GitHub
# release). Aligned 2026-07-20 (tracking issue #28, item A1) after a full
# test:matrix pass on both DB backends confirmed it green with zero
# tolerated drifts (see e2e-verdicts/ and the PR that bumped this pin).
# This is also the version the vendored OpenAPI spec at
# docs/vikunja-openapi.json is captured from — fetched directly from this
# same pinned container's own /api/v1/docs.json (via `npm run
# fetch:api-spec:container`, see docs/API-SPEC.md), not try.vikunja.io
# (which always runs `unstable`, ahead of any tag — that's the drift class
# the previous 2.3.0 pin's vendored spec had, e.g. `v2.3.0-1019-g95b7e673`).
# Fetching from the pinned container itself instead means the vendored spec
# and this pin are byte-for-byte in sync by construction.
#
# Policy: **minimum supported Vikunja is 2.3.0** (the v1-floor — some
# workarounds in src/ target upstream bugs still present at 2.3.0, e.g. the
# by-id share GET bug fixed upstream only in 2.4.0; see
# src/tools/sharing.ts / docs/API-COVERAGE.md), while **2.4.0 is the
# aligned/tested default** everything in this repo is validated against
# day to day. Both are worth running (see docs/LOCAL-TESTING.md).
#
# The tag is env-driven (`VIKUNJA_VERSION`, default `2.4.0` below) so the
# version-matrix runner (`npm run test:matrix`, see
# scripts/test-matrix.ts and docs/LOCAL-TESTING.md) can bring this stack
# up against a different Vikunja release without editing this file:
#
#   VIKUNJA_VERSION=2.3.0 npm run e2e:up   # the v1-floor regression check
#
# Plain `npm run e2e:up` (no override) uses the `2.4.0` default. Re-pin the
# *default* by bumping the fallback value below (see docs/LOCAL-TESTING.md's
# version-refresh note) once a newer stable release ships and becomes the
# new baseline everyone gets by default.
#
# DB BACKEND VARIANT (`VIKUNJA_DB=postgres|sqlite`, default `postgres`):
# item F2 (tracking issue #28) adds a SQLite-backed variant of this stack so
# SQLite-only failure classes (e.g. #116's "database is locked" write-storm
# under the circuit breaker) aren't invisible to every local/CI-adjacent run
# just because this stack always ran Postgres. Implemented with Compose
# *profiles* rather than a merged overlay file: `db` and `files-init` (the
# files-volume chown helper, shared by both variants) are tagged
# `profiles: [postgres]` / `[postgres, sqlite]` respectively, and there are
# two mutually-exclusive `vikunja*` service definitions — `vikunja`
# (profile `postgres`, unchanged from before this variant existed) and
# `vikunja-sqlite` (profile `sqlite`, no `db` dependency, backed by its own
# named volume, `vikunja-mcp-e2e-sqlite-db`, holding the embedded SQLite
# file). Two service blocks (rather than one templated block with a
# conditional `depends_on`) because Compose can't conditionally omit a
# `depends_on` entry per-profile in a single service — and referencing a
# profile-excluded service from `depends_on` is a hard error — so this is
# the cleaner of the two options the item called out (profiles vs. a second
# overlay file). Both variants publish the same host port (33456); only one
# is ever active at a time because a caller always selects exactly one
# profile via `docker/e2e/bootstrap.sh` (`VIKUNJA_DB` env var, defaulting to
# `postgres` -- unset/default behavior is byte-for-byte what this stack did
# before this variant existed). `npm run e2e:down` always activates *both*
# profiles so `-v` reliably removes all three named volumes regardless of
# which variant was last up -- see package.json.
name: vikunja-mcp-e2e

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: [postgres]
    environment:
      POSTGRES_USER: vikunja
      POSTGRES_PASSWORD: vikunja
      POSTGRES_DB: vikunja
    volumes:
      - vikunja-mcp-e2e-db:/var/lib/postgresql/data
    # Exposed on an unusual host port purely for ad-hoc debugging
    # (psql -h localhost -p 33457 -U vikunja). Not required by the stack.
    ports:
      - '33457:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vikunja -d vikunja']
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  # One-shot helper: the vikunja image runs as uid 1000 with no shell (it's
  # built FROM scratch), so it cannot chown its own files volume on first
  # boot. Named volumes are created root-owned by the Docker daemon, so we
  # fix ownership here, once, before the vikunja service starts. Shared by
  # both DB-backend variants (the files volume holds attachments, unrelated
  # to which database backend is in play).
  files-init:
    image: busybox:1.36
    profiles: [postgres, sqlite]
    command: ['sh', '-c', 'chown -R 1000:1000 /files']
    volumes:
      - vikunja-mcp-e2e-files:/files

  # Same chown problem as files-init above, but for the SQLite variant's
  # own data-file volume (only relevant in `sqlite` profile).
  sqlite-db-init:
    image: busybox:1.36
    profiles: [sqlite]
    command: ['sh', '-c', 'chown -R 1000:1000 /db']
    volumes:
      - vikunja-mcp-e2e-sqlite-db:/db

  # Postgres-backed variant (default; `VIKUNJA_DB=postgres`, `profiles: [postgres]`).
  vikunja:
    image: vikunja/vikunja:${VIKUNJA_VERSION:-2.4.0}
    restart: unless-stopped
    profiles: [postgres]
    depends_on:
      db:
        condition: service_healthy
      files-init:
        condition: service_completed_successfully
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: db
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_PASSWORD: vikunja
      VIKUNJA_DATABASE_DATABASE: vikunja
      # Local-only, throwaway secret. This stack is never meant to hold
      # real data or be reachable from anywhere but localhost; do not
      # reuse this value for anything real.
      VIKUNJA_SERVICE_SECRET: 'e2e-local-only-not-for-production-use'
      VIKUNJA_SERVICE_PUBLICURL: 'http://localhost:33456'
      # No self-service signups in this stack — the bootstrap script
      # creates the single test user directly via the container CLI.
      VIKUNJA_SERVICE_ENABLEREGISTRATION: 'false'
    ports:
      - '33456:3456'
    volumes:
      - vikunja-mcp-e2e-files:/app/vikunja/files
    healthcheck:
      # The vikunja image is FROM scratch (no shell, no curl/wget), so we
      # use its own `healthcheck` subcommand rather than an HTTP probe.
      test: ['CMD', '/app/vikunja/vikunja', 'healthcheck']
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  # SQLite-backed variant (`VIKUNJA_DB=sqlite`, `profiles: [sqlite]`) — the
  # embedded, file-backed database SQLite-lock-contention bugs (e.g. #116)
  # need a real backend to reproduce against. No `db` dependency at all: the
  # whole point is that there's no separate database service. The db file
  # lives in the `vikunja-mcp-e2e-sqlite-db` named volume so `e2e:down -v`
  # cleans it up exactly like the Postgres variant's own volume.
  vikunja-sqlite:
    image: vikunja/vikunja:${VIKUNJA_VERSION:-2.4.0}
    restart: unless-stopped
    profiles: [sqlite]
    depends_on:
      files-init:
        condition: service_completed_successfully
      sqlite-db-init:
        condition: service_completed_successfully
    environment:
      VIKUNJA_DATABASE_TYPE: sqlite
      VIKUNJA_DATABASE_PATH: /db/vikunja.db
      # Local-only, throwaway secret -- same value as the postgres variant,
      # see the comment there. Kept identical so bootstrap.sh/harnesses
      # don't need per-variant secrets.
      VIKUNJA_SERVICE_SECRET: 'e2e-local-only-not-for-production-use'
      VIKUNJA_SERVICE_PUBLICURL: 'http://localhost:33456'
      VIKUNJA_SERVICE_ENABLEREGISTRATION: 'false'
    ports:
      - '33456:3456'
    volumes:
      - vikunja-mcp-e2e-files:/app/vikunja/files
      - vikunja-mcp-e2e-sqlite-db:/db
    healthcheck:
      test: ['CMD', '/app/vikunja/vikunja', 'healthcheck']
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  vikunja-mcp-e2e-db:
  vikunja-mcp-e2e-files:
  vikunja-mcp-e2e-sqlite-db:
